name: Sync provider dashboard

on:
  schedule:
    # Every 6 hours.  Adjust if you want fresher (cost: more API calls)
    # or quieter (cost: more stale).  Manual trigger always available
    # via workflow_dispatch.
    - cron: '0 */6 * * *'
  workflow_dispatch:

# A previous run still in progress when a new one is scheduled?
# Cancel it — the dashboard is idempotent and the latest data wins.
concurrency:
  group: sync-dashboard
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit profile/README.md updates
      issues: write     # post / edit sticky comments on tracking issues
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install seller SDK
        # Always install — the dashboard imports ``AsyncClient`` from
        # ``unitysvc_sellers`` directly.  When ``UNITYSVC_SELLER_API_KEY``
        # is unset the script still runs (the seller-data columns just
        # render as ``—``); but the import has to succeed.
        run: |
          python -m pip install --quiet unitysvc-sellers

      - name: Render and write
        env:
          # The default GITHUB_TOKEN is scoped to *this* repo; reading
          # cross-repo issues + comments + workflow runs needs a PAT
          # with org-wide repo:read + issues:write.  Provision as
          # ``LABS_DASHBOARD_TOKEN`` (fine-grained PAT recommended).
          # When the secret is unset the script still runs but cross-
          # repo reads / writes degrade silently to "—" / no-op.
          GH_TOKEN: ${{ secrets.LABS_DASHBOARD_TOKEN || secrets.GITHUB_TOKEN }}
          # ``--base-url`` is read from this env var by ``usvc_seller``
          # so we don't have to plumb it through the script.  Unset →
          # defaults to seller.unitysvc.com prod.
          UNITYSVC_SELLER_API_KEY: ${{ secrets.UNITYSVC_SELLER_API_KEY }}
          UNITYSVC_SELLER_API_URL: ${{ secrets.UNITYSVC_SELLER_API_URL }}
        run: |
          python scripts/sync_dashboard.py

      - name: Commit README updates
        run: |
          if git diff --quiet profile/README.md; then
            echo "No README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "Auto-sync provider dashboard"
          git push
